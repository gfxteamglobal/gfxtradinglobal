<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unlock Risk Calculator | GFx</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
overflow:hidden;
background:#0b0f14;
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

/* Animated Background */

.bg{
position:absolute;
width:100%;
height:100%;
overflow:hidden;
}

.circle{
position:absolute;
border-radius:50%;
filter:blur(120px);
animation:float 12s infinite alternate ease-in-out;
}

.circle1{
width:500px;
height:500px;
background:#ff7a18;
top:-150px;
left:-150px;
}

.circle2{
width:500px;
height:500px;
background:#1e90ff;
right:-150px;
bottom:-150px;
animation-delay:2s;
}

@keyframes float{
from{
transform:translate(0,0);
}
to{
transform:translate(100px,60px);
}
}

/* Card */

.card{
position:relative;
z-index:5;
width:450px;
padding:40px;
border-radius:25px;
background:rgba(255,255,255,.05);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.08);
box-shadow:0 0 50px rgba(0,0,0,.3);
animation:fadeUp .8s ease;
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.logo{
font-size:42px;
font-weight:800;
text-align:center;
margin-bottom:10px;
background:linear-gradient(90deg,#ff7a18,#1e90ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.title{
text-align:center;
color:white;
font-size:28px;
font-weight:700;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#9aa4b2;
font-size:15px;
margin-bottom:30px;
line-height:1.6;
}

.input-group{
margin-bottom:18px;
}

.input-group input{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#151b23;
color:white;
font-size:15px;
transition:.3s;
}

.input-group input:focus{
outline:none;
box-shadow:0 0 0 2px #1e90ff;
}

.btn{
width:100%;
padding:16px;
border:none;
border-radius:12px;
cursor:pointer;
font-size:16px;
font-weight:700;
color:white;
background:linear-gradient(90deg,#ff7a18,#1e90ff);
transition:.3s;
}

.btn:hover{
transform:translateY(-2px);
}

.btn:disabled{
opacity:.7;
cursor:not-allowed;
}

.features{
margin-top:25px;
color:#a9b4c0;
font-size:14px;
}

.features div{
margin-bottom:8px;
}

.status{
margin-top:15px;
text-align:center;
font-size:14px;
color:#9aa4b2;
}

</style>
</head>
<body>

<div class="bg">
<div class="circle circle1"></div>
<div class="circle circle2"></div>
</div>

<div class="card">

<div class="logo">GFx</div>

<div class="title">
Unlock Risk Calculator
</div>

<div class="subtitle">
Get access to the professional GFx Risk Calculator and calculate precise position sizes before every trade.
</div>

<form id="leadForm">

<div class="input-group">
<input
type="text"
name="Name"
placeholder="Full Name"
required>
</div>

<div class="input-group">
<input
type="email"
name="Email"
placeholder="Email Address"
required>
</div>

<button class="btn" id="submitBtn" type="submit">
Access Risk Calculator
</button>

<div class="status" id="status"></div>

</form>

<div class="features">
<div>✓ Forex Position Sizing</div>
<div>✓ Gold Lot Size Calculator</div>
<div>✓ Professional Risk Management</div>
</div>

</div>

<script>

const form = document.getElementById("leadForm");
const button = document.getElementById("submitBtn");
const statusText = document.getElementById("status");

form.addEventListener("submit", async function(e){

    e.preventDefault();

    button.disabled = true;
    button.innerText = "Loading...";
    statusText.innerText = "";

    const data = {
        Name: form.Name.value,
        Email: form.Email.value
    };

    try{

        const response = await fetch(
            "https://formspree.io/f/xnjypvoa",
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json",
                    "Accept":"application/json"
                },
                body:JSON.stringify(data)
            }
        );

        if(response.ok){

            statusText.innerText = "Access granted. Redirecting...";

            setTimeout(() => {
                window.location.href = "risk-calculator.html";
            }, 1000);

        }else{

            button.disabled = false;
            button.innerText = "Access Risk Calculator";
            statusText.innerText = "Submission failed. Please try again.";

        }

    }catch(error){

        button.disabled = false;
        button.innerText = "Access Risk Calculator →";
        statusText.innerText = "Network error. Please try again.";

    }

});

</script>

</body>
</html>
